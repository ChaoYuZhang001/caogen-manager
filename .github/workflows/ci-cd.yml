name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # iOS App 测试
  ios-test:
    name: iOS App Test
    runs-on: macos-latest
    strategy:
      matrix:
        destination: ['platform=iOS Simulator,name=iPhone 15']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CaogenApp/CaogenApp.xcodeproj \
            -scheme CaogenApp \
            -destination '${{ matrix.destination }}' \
            -configuration Debug

      - name: Run Tests
        run: |
          xcodebuild test \
            -project CaogenApp/CaogenApp.xcodeproj \
            -scheme CaogenApp \
            -destination '${{ matrix.destination }}' \
            -configuration Debug \
            | xcpretty

  # 后端服务测试
  backend-test:
    name: Backend Service Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: caogen-backend/package-lock.json

      - name: Install dependencies
        run: |
          cd caogen-backend
          npm ci

      - name: Lint
        run: |
          cd caogen-backend
          npm run lint || echo "No lint script"

      - name: Test
        run: |
          cd caogen-backend
          npm test || echo "No test script"

  # 代码质量检查
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          # 可以添加 prettier 或其他格式检查工具

      - name: Security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # 构建和打包
  build:
    name: Build & Package
    runs-on: macos-latest
    needs: [ios-test, backend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS App (Release)
        run: |
          xcodebuild archive \
            -project CaogenApp/CaogenApp.xcodeproj \
            -scheme CaogenApp \
            -archivePath ./build/CaogenApp.xcarchive \
            -configuration Release

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/CaogenApp.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaogenApp-IPA
          path: ./build/export/*.ipa

  # 部署通知
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Send notification
        run: |
          echo "Build completed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
